<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style id="maintenance-styles">
        :root { --bg: #031c2d; --teal: #00b4d8; --text: #b8d4e0; --white: #e8f4f8; }
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        .container { max-width: 600px; padding: 20px; transition: opacity 0.5s; }
        .icon { font-size: 80px; margin-bottom: 20px; display: block; animation: pulse 2s infinite; cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        h1 { font-size: 32px; color: var(--white); margin-bottom: 10px; font-weight: 900; }
        p { font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .brand { font-weight: bold; color: var(--teal); }
        .loader { width: 50px; height: 50px; border: 5px solid var(--text); border-bottom-color: var(--teal); border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-trigger { margin-top: 20px; opacity: 0.1; cursor: pointer; font-size: 12px; }
        .hidden-trigger:hover { opacity: 1; }
    </style>
    <script>
        // Check session before anything else
        (function() {
            const session = localStorage.getItem('dh_session');
            if (session) {
                // User is logged in, redirect or load content
                window.location.href = 'dental-hub-v33.html';
            }
        })();

        function showLogin() {
            // Since we can't easily open the modal from another file without loading it,
            // we'll redirect to the full page which will handle the auth check
            window.location.href = 'dental-hub-v33.html?action=login';
        }
    </script>
</head>
<body>
    <div class="container" id="maintenance-content">
        <span class="icon" onclick="showLogin()">🦷</span>
        <h1>الموقع تحت الصيانة حالياً</h1>
        <p>نحن نعمل على تحسين تجربة <span class="brand">Dental Hub</span> لنقدم لكم أفضل الخدمات. سنعود قريباً جداً!</p>
        <div class="loader"></div>
        <div class="hidden-trigger" onclick="showLogin()">تسجيل دخول الأعضاء</div>
    </div>
</body>
</html>
